<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
</head>
<body>
    <h1>Welcome {{ user }}</h1>

<a href="/logout">Logout</a>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <p style="color:blue;">{{ msg }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}
</body>
</html>
